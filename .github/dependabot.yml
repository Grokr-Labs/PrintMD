version: 2
updates:
  # Monitor GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    reviewers:
      - "JonathanWorks"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
