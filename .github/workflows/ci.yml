name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: Build & Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint
        run: swiftlint lint --strict Sources/ Tests/

      - name: Build
        run: |
          xcodebuild -project PrintMD.xcodeproj \
            -scheme PrintMD \
            -configuration Debug \
            -arch arm64 \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

  test:
    name: Unit Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Tests
        run: |
          xcodebuild test \
            -project PrintMD.xcodeproj \
            -scheme PrintMD \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Generate Coverage Report
        if: always()
        run: |
          echo "Tests completed successfully"

  security-scan:
    name: Security Check
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check for hardcoded secrets
        run: |
          SECRETS_FOUND=false
          if grep -r "password\|api_key\|secret\|token" \
            Sources/ Tests/ \
            --exclude-dir=.git \
            --include="*.swift" \
            | grep -v "//\|\"\""; then
            SECRETS_FOUND=true
          fi

          if [ "$SECRETS_FOUND" = true ]; then
            echo "⚠️  Possible hardcoded secrets detected"
            exit 1
          else
            echo "✅ No obvious hardcoded secrets found"
          fi
